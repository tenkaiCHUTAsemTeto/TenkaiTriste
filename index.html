<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apresentação - Tenakai</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .neon-text {
            font-size: 2.5em;
            color: #700092;
            text-shadow: 
                0 0 5px #000000,
                0 0 10px #000000,
                0 0 15px hwb(278 0% 27%),
                0 0 20px #000000,
                0 0 25px #000000;
            animation: flicker 1.5s infinite alternate;
            margin: 0;
            padding: 20px 0;
        }
        @keyframes flicker {
            0% { opacity: 1; }
            50% { opacity: 0.9; }
            100% { opacity: 0.8; }
        }
        .banner {
            width: 100%;
            height: 200px;
            background-image: url('https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExcjd6YTJsdzdldGprcDJzcml6Y3JpOHRxbTR4ZnRxbWk5cmNtNWVnMSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/V69LhUggYIg6qmKUoD/200.webp');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            margin: 20px 0 20px 0;
            border-radius: 10px;
        }
        .content {
            max-width: 800px;
            margin: 0 auto;
        }
        .section {
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        img {
            border-radius: 50%;
            width: 150px;
            height: 150px;
            margin: 20px 0;
        }
        hr {
            border: 1px solid #b705d3;
            margin: 40px 0;
        }
        /* Responsividade */
        @media (max-width: 600px) {
            .neon-text {
                font-size: 2em;
            }
            .banner {
                height: 150px;
            }
        }
    </style>
</head>
<body>
    <h1 class="neon-text">Tenakai</h1>
    
    <div class="banner"></div>
    
    <div class="content">
        <img src="img/sousou-no-frieren-frieren.gif" alt="Sua Foto">
        
        <div class="section">
            <h2>Sobre Mim</h2>
            <p>Aooba! Sou Tenakai, sou um programador iniciante e jogador de Roblox.</p>
        </div>
        
        <hr>
        
        <div class="section">
            <h2>Habilidades</h2>
            <ul>
                <li>HTML/CSS/JavaScript</li>
                <li>Git e GitHub</li>
                <li>[Outras habilidades]</li>
            </ul>
        </div>
        
        <hr>
        
        <div class="section">
            <h2>Contato</h2>
            <p>Email: NAOtenhoemailprabota@gmail.com</p>
            <p>GitHub: <a href="" target="_blank">github</a></p>
            <p>LinkedIn: [link]</p>
        </div>
    </div>
</body>
<!-- Player de áudio -->
<audio id="musica-fundo" autoplay loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- Botões de controle -->
<div class="player-musica">
    <button onclick="toggleMusica()">🔊/🔇</button>
</div>
</html>
